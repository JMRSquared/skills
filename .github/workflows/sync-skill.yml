name: Sync jmrsquared-standards to agent surfaces

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - 'rules/jmrsquared-activate.md'
      - 'hooks/**'
      - '.github/workflows/sync-skill.yml'

concurrency:
  group: sync-skill-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Rebuild agent rule files from rules/jmrsquared-activate.md
        run: |
          set -euo pipefail

          SRC="rules/jmrsquared-activate.md"
          [ -f "$SRC" ] || { echo "missing $SRC"; exit 1; }

          BODY="$(cat "$SRC")"

          mkdir -p .cursor/rules .windsurf/rules .clinerules .github
          {
            echo '---'
            echo 'description: "jmrsquared coding standards — always-on rules for every session."'
            echo 'alwaysApply: true'
            echo '---'
            echo
            echo "$BODY"
          } > .cursor/rules/jmrsquared.mdc

          {
            echo '---'
            echo 'trigger: always_on'
            echo 'description: jmrsquared coding standards — always-on rules for every session.'
            echo '---'
            echo
            echo "$BODY"
          } > .windsurf/rules/jmrsquared.md

          echo "$BODY" > .clinerules/jmrsquared.md
          echo "$BODY" > .github/copilot-instructions.md
          echo "$BODY" > AGENTS.md
          echo "$BODY" > GEMINI.md

          rm -f .cursor/rules/wonderhire.mdc .windsurf/rules/wonderhire.md .clinerules/wonderhire.md

      - name: Sync skills into plugin bundle + agent skill dirs
        run: |
          set -euo pipefail

          mkdir -p plugins/jmrsquared-standards/skills .cursor/skills .windsurf/skills
          rsync -a --delete skills/ plugins/jmrsquared-standards/skills/
          rsync -a --delete skills/ .cursor/skills/
          rsync -a --delete skills/ .windsurf/skills/

      - name: Sync hooks into plugin bundle
        run: |
          set -euo pipefail
          mkdir -p plugins/jmrsquared-standards/hooks
          rsync -a --delete hooks/ plugins/jmrsquared-standards/hooks/

      - name: Commit + push if anything changed
        run: |
          set -euo pipefail
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          if git diff --quiet; then
            echo 'no changes'
            exit 0
          fi
          git add -A
          git commit -m "chore: sync jmrsquared-standards to agent surfaces [skip ci]"
          git push
